name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      mc_version: ${{ steps.read_mc_version.outputs.mc_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK ${{ vars.BUILDS_JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ vars.BUILDS_JAVA_VERSION }}
          distribution: temurin

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v5

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Read Minecraft Version
        id: read_mc_version
        run: |
          MC_VERSION=$(grep "^minecraft.version=" gradle.properties | cut -d'=' -f2)
          if [ -z "$MC_VERSION" ]; then
            echo "Error: Failed to read minecraft.version from gradle.properties"
            exit 1
          fi
          echo "mc_version=$MC_VERSION" >> $GITHUB_OUTPUT
          echo "Minecraft version: $MC_VERSION"

      - name: Build with Gradle
        run: ./gradlew clean shadowJar

      - name: Get build artifact ready
        run: mkdir staging && cp build/libs/*.jar staging

      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v5
        with:
          name: Preview Build (Do not report bugs for this build)
          path: staging

  deploy-gr:
    needs: build
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' && github.ref == 'refs/heads/master') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: Preview Build (Do not report bugs for this build)
          path: staging

      - name: Get Version and Filename
        id: version
        run: |
          # Find the built jar
          JAR_PATH=$(ls staging/RebarMobs-*.jar | head -n 1)
          FILENAME=$(basename "$JAR_PATH")

          # Extract version from filename
          # Filename format: RebarMobs-<version>.jar
          VERSION=${FILENAME#RebarMobs-}
          VERSION=${VERSION%.jar}

          echo "jar_path=$JAR_PATH" >> $GITHUB_OUTPUT
          echo "filename=$FILENAME" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          echo "Found jar: $JAR_PATH"
          echo "Version: $VERSION"

      - name: Create JSON Payload
        id: payload
        run: |
          cat <<EOF > payload.json
          {
            "version": "${{ steps.version.outputs.version }}",
            "name": "v${{ steps.version.outputs.version }}",
            "channel": "dev",
            "changelog": "",
            "minecraft_versions": ["${{ needs.build.outputs.mc_version }}"],
            "files": ["${{ steps.version.outputs.filename }}"]
          }
          EOF

      - name: Upload to Guizhan Resources
        run: |
          HTTP_RESPONSE=$(curl -w "\n%{http_code}" -X POST "${{ vars.GUIZHAN_RESOURCES_BASE_URL }}/api/projects/${{ vars.GUIZHAN_RESOURCES_PROJECT_ID }}/versions" \
            -H "Authorization: Bearer ${{ secrets.GUIZHAN_RESOURCES_TOKEN }}" \
            -F "data=$(cat payload.json)" \
            -F "${{ steps.version.outputs.filename }}=@${{ steps.version.outputs.jar_path }};type=application/java-archive")
          HTTP_STATUS=$(echo "$HTTP_RESPONSE" | tail -n 1)
          RESPONSE_BODY=$(echo "$HTTP_RESPONSE" | sed '$d')
          echo "Response: $RESPONSE_BODY"
          echo "HTTP Status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "Error: Upload failed with status $HTTP_STATUS"
            exit 1
          fi
          echo "Upload successful!"
        env:
          GUIZHAN_RESOURCES_TOKEN: ${{ secrets.GUIZHAN_RESOURCES_TOKEN }}
