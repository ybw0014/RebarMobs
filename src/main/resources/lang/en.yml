addon: "Rebar Mobs"

item:
  soul_shard:
    name: "<reset>Soul Shard"
    lore: |-
      <arrow> A fractured crystal, pulsing with captured essence.

      <guidearrow> <insn>Sneak + Right click</insn> while holding in
      <guidearrow> main hand to reset type and soul amount.

      <arrow> <attr>Mob Type:</attr> %mob-type%
      <arrow> <attr>Tier:</attr> %tier%
      <arrow> <attr>Souls:</attr> %souls%
    no-mob-type: "<red>Not Bound"
  corrupted_essence:
    name: "<reset>Corrupted Essence"
  vile_dust:
    name: "<reset>Vile Dust"
  corrupted_ingot:
    name: "<reset>Corrupted Ingot"
  vile_sword_frame:
    name: "<reset>Vile Sword Frame"
  soul_altar:
    name: "<reset>Soul Altar"
    lore: |-
      <star> Multiblock
      <arrow> An ancient altar that whispers of transformation.
      <arrow> <insn>Right click</insn> with ingredient item in hand.
      <arrow> <red>The whole multiblock will be destroyed.</red>

      <u>Components</u>
      <diamond> 1x <yellow><item:rebarmobs:soul_altar/></yellow>
      <diamond> 4x <yellow><item:quartz_block/></yellow>
      <diamond> 4x <yellow><item:obsidian/></yellow>
  soul_cage:
    name: "<reset>Soul Cage"
    lore: |-
      <arrow> A cage forged from corrupted metal, hungry for souls.
      <arrow> It bends the boundary between life and death.

      <guidearrow> <insn>Right click</insn> with <item:rebarmobs:soul_shard> to activate.
      <guidearrow> <insn>Sneak + Right click</insn> to get <item:rebarmobs:soul_shard> back and deactivate.
    waila:
      empty: "Soul Cage | <red>Empty"
      filled: "Soul Cage | %mob-type% | Tier %tier%"
  cursed_fire:
    name: "<reset>Cursed Fire"
  quartz_and_steel:
    name: "<reset>Quartz and Steel"
  vile_sword:
    name: "<reset>Vile Sword"
    lore: |-
      <arrow> Gain 1 extra soul when killing
      <arrow> with this sword in main hand.

guide:
  page:
    rebar_mobs: "<reset>Rebar Mobs"
    resources_magic: "<reset>Magic Resources"
    blocks: "<reset>Blocks"

command:
  description: "RebarMobs main command"
  enchantment_book:
    description: "Grab an enchantment book with the given enchantment and level (default to 1)"
    invalid-enchantment: "<red>Invalid enchantment."
    invalid-level: "<red>Invalid enchantment level."
    success: "<green>Successfully obtained an enchantment book with %enchantment%, level %level%"
