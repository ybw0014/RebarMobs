addon: "Rebar Mobs"

item:
  soul_shard:
    name: "<reset>Soul Shard"
    lore: |-
      <arrow> <attr>Mob Type:</attr> %mob-type%
      <arrow> <attr>Tier:</attr> %tier%
      <arrow> <attr>Souls:</attr> %souls%
    no_mob_type: "<red>Not Bound"
  soul_altar:
    name: "<reset>Soul Altar"
    lore: |-
      <star> Multiblock
      <arrow> An ancient altar that whispers of transformation.
      <arrow> <insn>Right click</insn> with ingredient item in hand.
      <arrow> <red>The whole multiblock will be destroyed.</red>
      
      <u>Components</u>
      <diamond> 1x <yellow><item:rebarmobs:soul_altar/></yellow>
      <diamond> 4x <yellow><item:quartz_block/></yellow>
      <diamond> 4x <yellow><item:obsidian/></yellow>

guide:
  page:
    rebar_mobs: "<reset>Rebar Mobs"
    resources_magic: "<reset>Magic Resources"
    blocks: "<reset>Blocks"

enchantment:
  soul_stealer: "Soul Stealer"

command:
  description: "RebarMobs main command"
  enchantment_book:
    description: "Grab an enchantment book with the given enchantment and level (default to 1)"
    invalid_enchantment: "<red>Invalid enchantment."
    invalid_level: "<red>Invalid enchantment level."
    success: "<green>Successfully obtained an enchantment book with %enchantment%, level %level%"
  print_pdc:
    description: "Print the PersistentDataContainer of the item holding in main hand"
    no_item: "<red>No item in main hand!"