  soul_altar:
    name: "<reset>灵魂祭坛"
  soul_cage:
    name: "<reset>灵魂笼子"
    lore: |-
      <arrow> 一座由腐化金属锻造的牢笼，贪婪地渴求灵魂。
      <arrow> 它扭曲了生与死之间的界限。

      <guidearrow> 使用<item:rebarmobs:soul_shard><insn>右键点击</insn>以激活。
      <guidearrow> <insn>潜行 + 右键点击</insn>以收回<item:rebarmobs:soul_shard>并取消激活。
    waila:
      empty: "灵魂笼子 | <red>空"
      filled: "灵魂笼子 | %mob-type% | 等级 %tier%"
  cursed_fire:
    name: "<reset>诅咒之火"
  quartz_and_steel:
    name: "<reset>石英打火石"
  vile_sword:
    name: "<reset>邪恶之剑"
    lore: |-
      <arrow> 主手手持该剑击杀
      <arrow> 可额外获得一个灵魂。
  mob_head_info:
    name: "<reset>击杀生物"
    lore: |-
      <arrow> 击杀指定的生物有几率掉落其头颅。
      <arrow> 斩首者附魔可额外增加几率。

      <arrow> <attr>基础几率:</attr> %base-chance%
      <arrow> <attr>斩首者几率:</attr> 每级%decapitator-chance%
